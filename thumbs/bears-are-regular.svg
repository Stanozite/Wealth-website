<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="A long-term rising market line punctuated by recurring sharp downward dips, showing bear markets recur every few years while the trend continues up">
  <rect width="1200" height="630" fill="#f2f5f7"/>
  <rect width="1200" height="630" fill="#e4f7d2" opacity="0.18"/>

  <!-- title -->
  <text x="80" y="82" font-family="'IBM Plex Sans Thai',sans-serif" font-size="40" font-weight="700" fill="#163300">ตลาดหมีมาเป็นประจำ</text>
  <text x="80" y="122" font-family="'IBM Plex Sans Thai',sans-serif" font-size="22" font-weight="500" fill="#5b6b63">Bear markets are regular · they recur every few years</text>

  <!-- baseline -->
  <line x1="80" y1="500" x2="1120" y2="500" stroke="#163300" stroke-width="2" opacity="0.30"/>

  <!-- area fill under the long-term rising line -->
  <path d="M110,455 190,420 260,300 300,395 360,325 440,250 480,360 540,285 620,215 660,340 720,250 800,178 840,300 900,205 980,152 1020,258 1090,150 L1090,500 L110,500 Z" fill="#9fe870" opacity="0.16"/>

  <!-- long-term rising market line with recurring dips -->
  <polyline points="110,455 190,420 260,300 300,395 360,325 440,250 480,360 540,285 620,215 660,340 720,250 800,178 840,300 900,205 980,152 1020,258 1090,150"
    fill="none" stroke="#163300" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- bear-market dip markers (recurring) -->
  <circle cx="300" cy="395" r="9" fill="#a8200d"/>
  <circle cx="480" cy="360" r="9" fill="#a8200d"/>
  <circle cx="660" cy="340" r="9" fill="#a8200d"/>
  <circle cx="840" cy="300" r="9" fill="#a8200d"/>
  <circle cx="1020" cy="258" r="9" fill="#a8200d"/>

  <!-- long-term high (bright accent) -->
  <circle cx="1090" cy="150" r="11" fill="#9fe870" stroke="#163300" stroke-width="3"/>

  <!-- captions -->
  <text x="300" y="440" font-family="'IBM Plex Sans Thai',sans-serif" font-size="17" font-weight="700" fill="#a8200d" text-anchor="middle">หมี</text>
  <text x="480" y="405" font-family="'IBM Plex Sans Thai',sans-serif" font-size="17" font-weight="700" fill="#a8200d" text-anchor="middle">หมี</text>
  <text x="660" y="385" font-family="'IBM Plex Sans Thai',sans-serif" font-size="17" font-weight="700" fill="#a8200d" text-anchor="middle">หมี</text>
  <text x="840" y="345" font-family="'IBM Plex Sans Thai',sans-serif" font-size="17" font-weight="700" fill="#a8200d" text-anchor="middle">หมี</text>
  <text x="1020" y="303" font-family="'IBM Plex Sans Thai',sans-serif" font-size="17" font-weight="700" fill="#a8200d" text-anchor="middle">หมี</text>

  <text x="80" y="602" font-family="'IBM Plex Sans Thai',sans-serif" font-size="20" font-weight="600" fill="#163300">ไม่ใช่ความผิดปกติ · แต่คือค่าผ่านประตูของผลตอบแทนระยะยาว</text>

  <!-- wordmark -->
  <text x="1120" y="610" font-family="'IBM Plex Sans Thai',sans-serif" font-size="16" font-weight="600" fill="#8a97a0" text-anchor="end" opacity="0.85">Wealth Compass</text>
</svg>
