<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#163300"/>
  <circle cx="1080" cy="100" r="190" fill="#1d4400"/>
  <!-- mountain slope -->
  <path d="M0 630 L520 130 L660 270 L900 40 L1200 340 V630 Z" fill="#0d7a3f"/>
  <path d="M0 630 L520 130 L660 270 L900 40 L1200 340 V630 Z" fill="none" stroke="#9fe870" stroke-width="0"/>
  <!-- snowball rolling down -->
  <g transform="translate(330,330)">
    <circle r="95" fill="#ffffff"/>
    <circle r="95" fill="none" stroke="#e4e9ec" stroke-width="8"/>
    <path d="M-50 -28 A58 58 0 0 1 42 -52" fill="none" stroke="#e4e9ec" stroke-width="10" stroke-linecap="round"/>
    <path d="M-58 30 A66 66 0 0 0 30 62" fill="none" stroke="#e4e9ec" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- broken chain -->
  <g transform="translate(820,430)" stroke="#9fe870" stroke-width="18" fill="none" stroke-linecap="round">
    <ellipse cx="-110" cy="0" rx="48" ry="34"/>
    <ellipse cx="0" cy="10" rx="48" ry="34"/>
    <path d="M86 -6 L122 -34 M96 26 L140 40"/>
  </g>
  <!-- falling debris (debt shrinking) -->
  <circle cx="640" cy="180" r="16" fill="#9fe870"/>
  <circle cx="700" cy="120" r="10" fill="#9fe870"/>
  <circle cx="580" cy="250" r="12" fill="#9fe870"/>
</svg>
