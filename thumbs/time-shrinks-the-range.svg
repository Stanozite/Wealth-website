<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="The range of outcomes narrows the longer you hold">
  <rect width="1200" height="630" fill="#fbfdf9"/>
  <rect width="1200" height="630" fill="#e4f7d2" opacity="0.18"/>

  <!-- zero line (worst case drifts up toward it, then above) -->
  <line x1="150" y1="345" x2="1080" y2="345" stroke="#c7d3bd" stroke-width="2" stroke-dasharray="6 8"/>
  <text x="150" y="335" font-family="'IBM Plex Sans Thai',sans-serif" font-size="18" font-weight="600" fill="#8a97a0">0%</text>

  <!-- the cone: wide range on the left, narrow band on the right -->
  <path d="M150 95 C 450 150 750 215 1080 250 L 1080 322 C 750 362 450 472 150 560 Z"
        fill="#9fe870" opacity="0.5"/>

  <!-- best-case boundary (forest) -->
  <path d="M150 95 C 450 150 750 215 1080 250" fill="none" stroke="#163300" stroke-width="7" stroke-linecap="round"/>
  <!-- worst-case boundary (muted red), rising from deep negative toward positive -->
  <path d="M150 560 C 450 472 750 362 1080 322" fill="none" stroke="#a8200d" stroke-width="6" stroke-linecap="round"/>

  <!-- convergence endpoints on the right -->
  <circle cx="1080" cy="250" r="12" fill="#9fe870" stroke="#163300" stroke-width="4"/>
  <circle cx="1080" cy="322" r="10" fill="#a8200d"/>

  <!-- wide bracket (left) -->
  <g stroke="#5b6b63" stroke-width="3" fill="none" opacity="0.8">
    <path d="M120 95 L108 95 L108 560 L120 560"/>
  </g>
  <text x="60" y="333" font-family="'IBM Plex Sans Thai',sans-serif" font-size="24" font-weight="700" fill="#5b6b63" transform="rotate(-90 60 333)" text-anchor="middle">ช่วงกว้าง</text>

  <!-- narrow bracket (right) -->
  <g stroke="#163300" stroke-width="3" fill="none" opacity="0.85">
    <path d="M1110 250 L1122 250 L1122 322 L1110 322"/>
  </g>
  <text x="1160" y="292" font-family="'IBM Plex Sans Thai',sans-serif" font-size="24" font-weight="700" fill="#163300" transform="rotate(90 1160 292)" text-anchor="middle">แคบ</text>

  <!-- inline labels on the boundaries -->
  <text x="470" y="150" font-family="'IBM Plex Sans Thai',sans-serif" font-size="22" font-weight="700" fill="#163300">ดีสุด</text>
  <text x="430" y="500" font-family="'IBM Plex Sans Thai',sans-serif" font-size="22" font-weight="700" fill="#a8200d">แย่สุด</text>

  <!-- title -->
  <text x="150" y="58" font-family="'IBM Plex Sans Thai',sans-serif" font-size="40" font-weight="800" fill="#163300">ยิ่งถือนาน ช่วงผลลัพธ์ยิ่งแคบ</text>

  <!-- x-axis timeline -->
  <g font-family="'IBM Plex Sans Thai',sans-serif" font-weight="600" fill="#7d8a90" font-size="20">
    <text x="150" y="605" text-anchor="middle">ถือ 1 ปี</text>
    <text x="460" y="605" text-anchor="middle">5 ปี</text>
    <text x="770" y="605" text-anchor="middle">10 ปี</text>
    <text x="1080" y="605" text-anchor="middle">20 ปี</text>
  </g>
</svg>
