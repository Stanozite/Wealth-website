<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Two bars from the same fund: a taller fund-return bar and a shorter investor-return bar, with the gap between their tops highlighted">
  <rect width="1200" height="630" fill="#fbfdf9"/>
  <rect width="1200" height="630" fill="#e4f7d2" opacity="0.20"/>

  <!-- title -->
  <text x="80" y="82" font-family="'IBM Plex Sans Thai',sans-serif" font-size="40" font-weight="700" fill="#163300">ช่องว่างพฤติกรรม</text>
  <text x="80" y="122" font-family="'IBM Plex Sans Thai',sans-serif" font-size="22" font-weight="500" fill="#5b6b63">The behavior gap · investors often earn less than their own fund</text>

  <!-- baseline -->
  <line x1="80" y1="500" x2="1120" y2="500" stroke="#163300" stroke-width="2" opacity="0.35"/>

  <!-- fund return bar (taller) -->
  <rect x="330" y="200" width="150" height="300" rx="6" fill="#163300"/>
  <!-- investor return bar (shorter, the gap) -->
  <rect x="720" y="270" width="150" height="230" rx="6" fill="#9fe870"/>

  <!-- gap indicator between the two tops -->
  <line x1="405" y1="200" x2="795" y2="200" stroke="#163300" stroke-width="2" stroke-dasharray="7 7" opacity="0.55"/>
  <line x1="795" y1="200" x2="795" y2="270" stroke="#163300" stroke-width="3"/>
  <path d="M 795 200 l -8 14 l 16 0 z" fill="#163300"/>
  <path d="M 795 270 l -8 -14 l 16 0 z" fill="#163300"/>
  <rect x="822" y="216" width="196" height="38" rx="8" fill="#163300"/>
  <text x="920" y="242" font-family="'IBM Plex Sans Thai',sans-serif" font-size="20" font-weight="700" fill="#9fe870" text-anchor="middle">ช่องว่าง = พฤติกรรม</text>

  <!-- bar captions -->
  <text x="405" y="536" font-family="'IBM Plex Sans Thai',sans-serif" font-size="20" font-weight="700" fill="#163300" text-anchor="middle">ผลตอบแทนกองทุน</text>
  <text x="405" y="562" font-family="'IBM Plex Sans Thai',sans-serif" font-size="16" font-weight="500" fill="#5b6b63" text-anchor="middle">Fund return</text>
  <text x="795" y="536" font-family="'IBM Plex Sans Thai',sans-serif" font-size="20" font-weight="700" fill="#163300" text-anchor="middle">ผลตอบแทนที่นักลงทุนได้จริง</text>
  <text x="795" y="562" font-family="'IBM Plex Sans Thai',sans-serif" font-size="16" font-weight="500" fill="#5b6b63" text-anchor="middle">Investor return</text>

  <text x="80" y="602" font-family="'IBM Plex Sans Thai',sans-serif" font-size="20" font-weight="600" fill="#163300">ซื้อแพงขายถูกซ้ำ ๆ · ทำให้ได้น้อยกว่ากองที่ตัวเองถือ (ภาพประกอบ)</text>

  <!-- wordmark -->
  <text x="1120" y="610" font-family="'IBM Plex Sans Thai',sans-serif" font-size="16" font-weight="600" fill="#8a97a0" text-anchor="end" opacity="0.85">Wealth Compass</text>
</svg>
