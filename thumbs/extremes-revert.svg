<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ของสุดขั้วมักกลับสู่ค่ากลาง">
  <defs>
    <style>
      .t-forest { fill:#163300; font-family:'IBM Plex Sans Thai','IBM Plex Sans',sans-serif; }
      .t-red { fill:#a8200d; font-family:'IBM Plex Sans Thai','IBM Plex Sans',sans-serif; }
      .t-mut { fill:#4a5a4a; font-family:'IBM Plex Sans Thai','IBM Plex Sans',sans-serif; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#fbfdf9"/>
  <circle cx="1080" cy="110" r="300" fill="#e4f7d2" opacity="0.5"/>
  <circle cx="120" cy="600" r="200" fill="#e4f7d2" opacity="0.38"/>

  <!-- wordmark -->
  <text x="80" y="92" class="t-forest" font-size="26" font-weight="700">Wealth Compass</text>
  <rect x="80" y="110" width="54" height="5" rx="2.5" fill="#9fe870"/>

  <!-- headline -->
  <text x="80" y="220" class="t-forest" font-size="68" font-weight="800">ของสุดขั้ว</text>
  <text x="80" y="296" class="t-forest" font-size="68" font-weight="800">มักกลับสู่<tspan class="t-red">ค่ากลาง</tspan></text>
  <text x="80" y="348" class="t-mut" font-size="30" font-weight="600">แต่ตามจังหวะของมันเอง</text>

  <!-- long-run mean line (dashed) -->
  <line x1="80" y1="470" x2="1130" y2="470" stroke="#a8200d" stroke-width="3" stroke-dasharray="7 8" opacity="0.85"/>
  <text x="1120" y="456" class="t-mut" font-size="22" font-weight="600" text-anchor="end">ค่ากลางระยะยาว</text>

  <!-- the metric: a wavy line oscillating around the mean -->
  <path d="M120 390
           C190 390 190 446 260 446
           C330 446 330 494 400 494
           C470 494 470 446 540 446
           C610 446 610 406 680 406
           C750 406 750 478 820 478
           C890 478 890 534 960 534
           C1030 534 1030 486 1100 486"
        fill="none" stroke="#163300" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- extreme-point markers -->
  <circle cx="120" cy="390" r="12" fill="#9fe870" stroke="#163300" stroke-width="4"/>
  <circle cx="680" cy="406" r="10" fill="#9fe870" stroke="#163300" stroke-width="4"/>
  <circle cx="960" cy="534" r="10" fill="#a8200d"/>
  <circle cx="400" cy="494" r="9" fill="#a8200d"/>
</svg>
