<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Personal inflation vs CPI">
  <rect width="1200" height="630" fill="#fbfdf9"/>
  <rect width="1200" height="630" fill="#e4f7d2" opacity="0.22"/>
  <line x1="120" y1="520" x2="1080" y2="520" stroke="#dfe7d8" stroke-width="2"/>
  <!-- CPI low flat -->
  <path d="M140 470 C 400 460, 700 450, 1050 440" fill="none" stroke="#8a97a0" stroke-width="5" stroke-linecap="round"/>
  <text x="700" y="430" font-family="'IBM Plex Sans Thai',sans-serif" font-size="22" font-weight="700" fill="#5b6b63">CPI (เฉลี่ย)</text>
  <!-- healthcare steep -->
  <path d="M140 470 C 420 380, 720 240, 1050 130" fill="none" stroke="#163300" stroke-width="6" stroke-linecap="round"/>
  <text x="760" y="150" font-family="'IBM Plex Sans Thai',sans-serif" font-size="22" font-weight="700" fill="#163300">ค่ารักษาพยาบาล</text>
  <!-- education medium -->
  <path d="M140 470 C 430 410, 730 320, 1050 250" fill="none" stroke="#9fe870" stroke-width="6" stroke-linecap="round"/>
  <text x="770" y="270" font-family="'IBM Plex Sans Thai',sans-serif" font-size="22" font-weight="700" fill="#4a7a2a">ค่าการศึกษา</text>
  <text x="140" y="450" font-family="'IBM Plex Sans Thai',sans-serif" font-size="20" font-weight="600" fill="#163300">เงินเฟ้อของคุณ ≠ ตัวเลขเฉลี่ย</text>
</svg>
