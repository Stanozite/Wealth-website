<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Descending bars showing the share of active funds beating the index shrinking from 1 to 15 years, below a full index reference line">
  <rect width="1200" height="630" fill="#fbfdf9"/>
  <rect width="1200" height="630" fill="#e4f7d2" opacity="0.20"/>

  <!-- title -->
  <text x="80" y="82" font-family="'IBM Plex Sans Thai',sans-serif" font-size="40" font-weight="700" fill="#163300">กองทุน active ส่วนใหญ่แพ้ดัชนี</text>
  <text x="80" y="122" font-family="'IBM Plex Sans Thai',sans-serif" font-size="22" font-weight="500" fill="#5b6b63">Why most active funds lose to the index · the longer you measure, the fewer win</text>

  <!-- index reference line (the benchmark to beat — stays full) -->
  <line x1="120" y1="205" x2="1080" y2="205" stroke="#163300" stroke-width="2.5" stroke-dasharray="9 7"/>
  <text x="1080" y="197" font-family="'IBM Plex Sans Thai',sans-serif" font-size="19" font-weight="700" fill="#163300" text-anchor="end">เส้นดัชนี · เกณฑ์ที่ต้องเอาชนะ / Index benchmark</text>

  <!-- baseline -->
  <line x1="120" y1="500" x2="1080" y2="500" stroke="#163300" stroke-width="2" opacity="0.35"/>

  <!-- bars: 1y -> 15y, share beating the index shrinks (illustrative) -->
  <!-- 1 year -->
  <rect x="150" y="248" width="120" height="252" rx="4" fill="#163300"/>
  <text x="210" y="232" font-family="'IBM Plex Sans Thai',sans-serif" font-size="24" font-weight="700" fill="#163300" text-anchor="middle">42%</text>
  <text x="210" y="536" font-family="'IBM Plex Sans Thai',sans-serif" font-size="21" font-weight="600" fill="#5b6b63" text-anchor="middle">1 ปี</text>

  <!-- 3 years -->
  <rect x="336" y="332" width="120" height="168" rx="4" fill="#9fe870"/>
  <text x="396" y="316" font-family="'IBM Plex Sans Thai',sans-serif" font-size="24" font-weight="700" fill="#163300" text-anchor="middle">28%</text>
  <text x="396" y="536" font-family="'IBM Plex Sans Thai',sans-serif" font-size="21" font-weight="600" fill="#5b6b63" text-anchor="middle">3 ปี</text>

  <!-- 5 years -->
  <rect x="522" y="380" width="120" height="120" rx="4" fill="#163300"/>
  <text x="582" y="364" font-family="'IBM Plex Sans Thai',sans-serif" font-size="24" font-weight="700" fill="#163300" text-anchor="middle">20%</text>
  <text x="582" y="536" font-family="'IBM Plex Sans Thai',sans-serif" font-size="21" font-weight="600" fill="#5b6b63" text-anchor="middle">5 ปี</text>

  <!-- 10 years -->
  <rect x="708" y="422" width="120" height="78" rx="4" fill="#9fe870"/>
  <text x="768" y="406" font-family="'IBM Plex Sans Thai',sans-serif" font-size="24" font-weight="700" fill="#163300" text-anchor="middle">13%</text>
  <text x="768" y="536" font-family="'IBM Plex Sans Thai',sans-serif" font-size="21" font-weight="600" fill="#5b6b63" text-anchor="middle">10 ปี</text>

  <!-- 15 years -->
  <rect x="894" y="452" width="120" height="48" rx="4" fill="#7bab52"/>
  <text x="954" y="436" font-family="'IBM Plex Sans Thai',sans-serif" font-size="24" font-weight="700" fill="#163300" text-anchor="middle">8%</text>
  <text x="954" y="536" font-family="'IBM Plex Sans Thai',sans-serif" font-size="21" font-weight="600" fill="#5b6b63" text-anchor="middle">15 ปี</text>

  <!-- muted-red decline arrow over the bar tops -->
  <polyline points="210,248 396,332 582,380 768,422 954,452" fill="none" stroke="#a8200d" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <polygon points="954,452 936,438 950,468" fill="#a8200d" opacity="0.9"/>

  <!-- caption -->
  <text x="150" y="585" font-family="'IBM Plex Sans Thai',sans-serif" font-size="21" font-weight="700" fill="#a8200d">ยิ่งวัดนาน ยิ่งเหลือกองที่ชนะดัชนีน้อยลง · ตัวอย่างเชิงแนวคิด อ้าง S&amp;P SPIVA</text>

  <!-- wordmark -->
  <text x="1080" y="610" font-family="'IBM Plex Sans Thai',sans-serif" font-size="16" font-weight="600" fill="#8a97a0" text-anchor="end" opacity="0.85">Wealth Compass</text>
</svg>
