<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Lifestyle inflation: split the raise">
  <rect width="1200" height="630" fill="#fbfdf9"/>
  <rect width="1200" height="630" fill="#e4f7d2" opacity="0.25"/>
  <!-- rising income bars -->
  <g>
    <rect x="140" y="380" width="90" height="150" rx="6" fill="#163300"/>
    <rect x="270" y="320" width="90" height="210" rx="6" fill="#163300"/>
    <rect x="400" y="250" width="90" height="280" rx="6" fill="#163300"/>
    <!-- the raise slice (lime) on top of each -->
    <rect x="140" y="352" width="90" height="28" rx="4" fill="#9fe870"/>
    <rect x="270" y="284" width="90" height="36" rx="4" fill="#9fe870"/>
    <rect x="400" y="206" width="90" height="44" rx="4" fill="#9fe870"/>
  </g>
  <!-- flat savings line -->
  <line x1="120" y1="470" x2="520" y2="470" stroke="#8a97a0" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="120" y="500" font-family="'IBM Plex Sans Thai',sans-serif" font-size="22" fill="#5b6b73">เงินเก็บ (แบน)</text>
  <!-- split arrow diverting raise upward into net worth -->
  <path d="M560 300 C 660 300, 700 220, 820 190" fill="none" stroke="#163300" stroke-width="5" stroke-linecap="round"/>
  <polygon points="820,190 796,186 806,208" fill="#163300"/>
  <!-- growing net-worth curve -->
  <path d="M700 470 C 800 460, 900 360, 1060 210" fill="none" stroke="#2f7a3f" stroke-width="6" stroke-linecap="round"/>
  <circle cx="1060" cy="210" r="12" fill="#9fe870" stroke="#163300" stroke-width="4"/>
  <text x="700" y="520" font-family="'IBM Plex Sans Thai',sans-serif" font-size="26" font-weight="700" fill="#163300">แบ่งครึ่งเงินที่เพิ่ม → ความมั่งคั่งโต</text>
</svg>
