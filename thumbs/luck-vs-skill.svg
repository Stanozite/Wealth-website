<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="IBM Plex Sans Thai, sans-serif">
  <rect width="1200" height="630" fill="#f2f5f7"/>
  <circle cx="1105" cy="70" r="170" fill="#e4f7d2"/>
  <circle cx="70" cy="600" r="150" fill="#e4f7d2"/>

  <!-- ===== title ===== -->
  <text x="90" y="112" font-size="46" font-weight="700" fill="#163300">โชคหรือฝีมือ?</text>
  <text x="90" y="156" font-size="24" font-weight="600" fill="#0d7a3f">ยิ่งกิจกรรมมีโชคมาก ผลงานดี ๆ ยิ่งหลอกตา</text>
  <text x="90" y="188" font-size="19" font-weight="500" fill="#6b7a80">Luck or skill · the more luck, the more a good record fools you</text>

  <!-- ===== clover mark (top-right) ===== -->
  <g transform="translate(1092,150)">
    <circle cx="0" cy="-15" r="17" fill="#163300"/>
    <circle cx="-15" cy="0" r="17" fill="#163300"/>
    <circle cx="15" cy="0" r="17" fill="#9fe870"/>
    <circle cx="0" cy="15" r="17" fill="#163300"/>
    <rect x="-3" y="12" width="6" height="30" rx="3" fill="#163300"/>
  </g>

  <!-- ===== spectrum: skill (left, forest) → luck (right) ===== -->
  <!-- descending "skill share" bars, matching the article chart -->
  <g>
    <!-- baseline -->
    <line x1="150" y1="500" x2="1090" y2="500" stroke="#163300" stroke-width="3" opacity="0.35"/>

    <!-- bars: chess 95, tennis 80, business 50, investing 20, roulette ~2 -->
    <rect x="170"  y="262" width="120" height="238" rx="6" fill="#163300"/>
    <rect x="360"  y="300" width="120" height="200" rx="6" fill="#163300"/>
    <rect x="550"  y="375" width="120" height="125" rx="6" fill="#2e5f14"/>
    <rect x="740"  y="450" width="120" height="50"  rx="6" fill="#9fe870"/>
    <rect x="930"  y="490" width="120" height="10"  rx="5" fill="#c7d2cc"/>

    <!-- value chips -->
    <text x="230" y="248" text-anchor="middle" font-size="21" font-weight="700" fill="#163300">95%</text>
    <text x="420" y="286" text-anchor="middle" font-size="21" font-weight="700" fill="#163300">80%</text>
    <text x="610" y="361" text-anchor="middle" font-size="21" font-weight="700" fill="#163300">50%</text>
    <text x="800" y="436" text-anchor="middle" font-size="21" font-weight="700" fill="#0d7a3f">20%</text>
    <text x="990" y="478" text-anchor="middle" font-size="21" font-weight="700" fill="#6b7a80">0%</text>

    <!-- x labels -->
    <g font-size="18" font-weight="600" fill="#455a5f" text-anchor="middle">
      <text x="230" y="528">หมากรุก</text>
      <text x="420" y="528">เทนนิส</text>
      <text x="610" y="528">ทำธุรกิจ</text>
      <text x="800" y="528">ลงทุน 1 ปี</text>
      <text x="990" y="528">รูเล็ต</text>
    </g>
  </g>

  <!-- ===== spectrum end captions ===== -->
  <g font-weight="700">
    <text x="170" y="575" font-size="20" fill="#163300">◀ ฝีมือล้วน · skill</text>
    <text x="1050" y="575" font-size="20" fill="#6b7a80" text-anchor="end">โชคล้วน · luck ▶</text>
  </g>

  <!-- axis note -->
  <text x="610" y="600" text-anchor="middle" font-size="15" font-weight="500" fill="#9aa7ad">สัดส่วนที่ "ฝีมือ" อธิบายผลลัพธ์ · แผนภาพแนวคิด</text>
</svg>
