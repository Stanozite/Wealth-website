<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="IBM Plex Sans Thai, sans-serif">
  <rect width="1200" height="630" fill="#f2f5f7"/>
  <circle cx="1105" cy="70" r="170" fill="#e4f7d2"/>
  <circle cx="70" cy="600" r="150" fill="#e4f7d2"/>

  <!-- ===== title ===== -->
  <text x="90" y="112" font-size="46" font-weight="700" fill="#163300">พลังของการทบต้น</text>
  <text x="90" y="156" font-size="24" font-weight="600" fill="#0d7a3f">฿1 ที่ 7% ต่อปี 100 ปี → เกือบ ฿868 · เกือบทั้งหมดโตช่วงท้าย</text>
  <text x="90" y="188" font-size="19" font-weight="500" fill="#6b7a80">The power of compounding · ฿1 at 7% for 100 years ≈ ฿868 (illustrative)</text>

  <!-- ===== left info chips ===== -->
  <!-- seed: start at ฿1 -->
  <g>
    <circle cx="132" cy="322" r="34" fill="#9fe870" stroke="#163300" stroke-width="2.5"/>
    <text x="132" y="331" font-size="22" font-weight="700" fill="#163300" text-anchor="middle">฿1</text>
    <text x="184" y="316" font-size="23" font-weight="700" fill="#163300">เริ่มต้นแค่ ฿1</text>
    <text x="184" y="344" font-size="18" font-weight="500" fill="#6b7a80">the seed · start small</text>
  </g>
  <!-- tail: end near ฿868 -->
  <g>
    <circle cx="132" cy="430" r="34" fill="#163300"/>
    <text x="132" y="437" font-size="19" font-weight="700" fill="#9fe870" text-anchor="middle">฿868</text>
    <text x="184" y="424" font-size="23" font-weight="700" fill="#163300">ปลายทางเกือบ ฿868</text>
    <text x="184" y="452" font-size="18" font-weight="500" fill="#6b7a80">the explosive tail</text>
  </g>

  <!-- time-is-the-ingredient chip -->
  <g>
    <rect x="98" y="500" width="420" height="60" rx="14" fill="#ffffff" stroke="#d7e0e4" stroke-width="2"/>
    <circle cx="134" cy="530" r="9" fill="#163300"/>
    <text x="156" y="524" font-size="19" font-weight="700" fill="#163300">เวลา คือวัตถุดิบที่ทรงพลังที่สุด</text>
    <text x="156" y="548" font-size="16" font-weight="500" fill="#6b7a80">เริ่มเร็ว ชนะ เริ่มด้วยเงินเยอะ</text>
  </g>

  <!-- ===== compounding hockey-stick curve (right) ===== -->
  <!-- faint gridlines -->
  <g stroke="#e4e9ec" stroke-width="2">
    <line x1="600" y1="300" x2="1140" y2="300"/>
    <line x1="600" y1="380" x2="1140" y2="380"/>
    <line x1="600" y1="460" x2="1140" y2="460"/>
  </g>
  <!-- baseline -->
  <line x1="600" y1="540" x2="1140" y2="540" stroke="#163300" stroke-width="3" opacity="0.3"/>

  <!-- lime area under the exponential curve -->
  <path d="M 600 540 L 708 539 L 816 536 L 924 524 L 1032 478 L 1140 300 L 1140 540 L 600 540 Z" fill="#9fe870" opacity="0.42"/>

  <!-- the compounding curve: flat then steep tail -->
  <polyline points="600,540 708,539 816,536 924,524 1032,478 1140,300" fill="none" stroke="#163300" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- start marker (฿1, small) -->
  <circle cx="600" cy="540" r="9" fill="#163300"/>
  <text x="600" y="522" font-size="18" font-weight="700" fill="#455a5f" text-anchor="middle">฿1</text>
  <!-- end marker (฿868, big) -->
  <circle cx="1140" cy="300" r="13" fill="#163300"/>
  <text x="1140" y="284" font-size="24" font-weight="700" fill="#163300" text-anchor="end">฿868</text>

  <!-- caption ===== -->
  <g font-weight="500">
    <text x="612" y="262" font-size="20" font-weight="700" fill="#163300">มูลค่าของ ฿1 · ทบต้น 7%/ปี</text>
    <text x="600" y="568" text-anchor="middle" font-size="18" fill="#7d8a90">ปี 0</text>
    <text x="1140" y="568" text-anchor="middle" font-size="18" fill="#7d8a90">ปี 100</text>
    <text x="870" y="512" text-anchor="middle" font-size="16" fill="#9aa7ad">ตัวอย่างสมมติ · ก่อนหักเงินเฟ้อ</text>
  </g>
</svg>
