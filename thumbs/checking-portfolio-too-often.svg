<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Checking too often vs calm">
  <rect width="1200" height="630" fill="#fbfdf9"/>
  <rect width="1200" height="630" fill="#e4f7d2" opacity="0.22"/>
  <!-- jagged anxious daily line -->
  <polyline points="120,300 170,220 200,360 250,180 290,380 340,240 380,400 430,260 480,360 520,300" fill="none" stroke="#a8200d" stroke-width="4"/>
  <text x="120" y="440" font-family="'IBM Plex Sans Thai',sans-serif" font-size="24" font-weight="700" fill="#a8200d">เช็คทุกวัน = เครียด</text>
  <!-- smooth calm long-term line -->
  <path d="M640 420 C 760 400, 900 300, 1080 200" fill="none" stroke="#163300" stroke-width="6" stroke-linecap="round"/>
  <circle cx="1080" cy="200" r="12" fill="#9fe870" stroke="#163300" stroke-width="4"/>
  <text x="640" y="470" font-family="'IBM Plex Sans Thai',sans-serif" font-size="24" font-weight="700" fill="#163300">เช็คตามรอบ = ตัดสินใจดี</text>
</svg>
